/* ─── Persona engine: derives persona from selections ────────────── */
function derivePersona(food, activities) {
  const all = [...food, ...activities];
  if (all.includes("nightlife") && all.includes("streetfood")) return "The Urban Explorer";
  if (all.includes("culture") && all.includes("wine")) return "The Convivial Host";
  if (all.includes("nature") && all.includes("culture")) return "The Contemplative";
  if (all.includes("nature") && (all.includes("sports") || all.includes("outdoors"))) return "The Active Adventurer";
  if (all.includes("culture") && all.includes("nightlife")) return "The Culture Seeker";
  if (all.includes("local") && all.includes("wine")) return "The Taste Hunter";
  if (all.includes("nightlife")) return "The Night Owl";
  if (all.includes("nature")) return "The Nature Seeker";
  if (all.includes("culture")) return "The Culture Seeker";
  if (all.includes("local") || all.includes("streetfood")) return "The Urban Explorer";
  return "The Curious Traveller";
}

/* ─── Category → type keyword mappings for match scoring ─────────── */
// These map user preferences to venue category keywords so matchScore
// can calculate how well a venue fits a specific user.
const PREFERENCE_KEYWORDS = {
  // Food preferences
  local: ["market", "local", "food", "street", "deli", "bakery"],
  wine: ["wine", "bar", "cocktail", "vineyard", "bistro"],
  streetfood: ["street", "food", "market", "takeaway", "fast"],
  finedining: ["restaurant", "fine", "dining", "gourmet"],
  coffee: ["coffee", "cafe", "roastery", "tea"],
  vegan: ["vegan", "vegetarian", "organic", "health"],
  // Activity preferences
  culture: ["museum", "art", "gallery", "theatre", "theater", "historic", "library", "church", "cultural"],
  nightlife: ["night", "club", "bar", "music", "live", "concert", "casino", "lounge"],
  nature: ["park", "garden", "nature", "trail", "hiking", "campground", "zoo", "botanical"],
  sports: ["gym", "stadium", "sport", "fitness", "swimming", "bowling", "climbing", "yoga"],
  outdoors: ["park", "outdoor", "adventure", "cycling", "beach", "lake", "campground"],
  shopping: ["shopping", "mall", "market", "store", "boutique"],
};

/* ─── Match scoring: uses actual user profile ────────────────────── */
function matchScore(place, userProfile) {
  const cats = (place.categories || []).map(c => (c.name || "").toLowerCase()).join(" ");
  const allPrefs = [...(userProfile.foodProfile || []), ...(userProfile.activities || [])];

  if (!allPrefs.length) {
    // No profile yet — generic scoring
    let score = 75;
    if (place.rating >= 4.5) score += 10;
    else if (place.rating >= 4.0) score += 5;
    if ((place.stats?.total_ratings || 0) > 300) score += 5;
    return Math.min(score, 99);
  }

  let score = 60; // base
  let hits = 0;

  // For each user preference, check if this venue's categories match
  allPrefs.forEach(pref => {
    const keywords = PREFERENCE_KEYWORDS[pref] || [pref];
    const matched = keywords.some(kw => cats.includes(kw));
    if (matched) {
      hits++;
      score += 8; // each matching preference adds points
    }
  });

  // Rating boost
  if (place.rating >= 4.5) score += 8;
  else if (place.rating >= 4.0) score += 4;
  else if (place.rating >= 3.5) score += 2;

  // Popularity boost (trust signal: recency/popularity)
  const ratings = place.stats?.total_ratings || 0;
  if (userProfile.trustSignals?.includes("popular")) {
    if (ratings > 1000) score += 6;
    else if (ratings > 300) score += 3;
  }
  if (userProfile.trustSignals?.includes("critical")) {
    // Critical users prefer places with moderate ratings (not tourist traps)
    if (place.rating >= 3.5 && place.rating < 4.5 && ratings > 100) score += 4;
  }
  if (userProfile.trustSignals?.includes("hidden")) {
    // Prefer hidden gems with fewer reviews but good ratings
    if (ratings < 200 && place.rating >= 4.0) score += 6;
  }

  // No-match penalty
  if (hits === 0) score -= 5;

  return Math.max(40, Math.min(score, 99));
}

const ACTIVITY_TEMPLATES = [
  { type: "🧗", label: "Bouldering drop-in", category: "sports" },
  { type: "🎶", label: "Jazz club session", category: "nightlife" },
  { type: "🚴", label: "Dawn cycling route", category: "outdoors" },
  { type: "🏊", label: "Open water swim", category: "outdoors" },
  { type: "🎨", label: "Street art walking tour", category: "culture" },
  { type: "🍜", label: "Local food market", category: "food" },
  { type: "🌄", label: "Sunrise hike", category: "outdoors" },
  { type: "🎭", label: "Underground theatre", category: "culture" },
  { type: "🕺", label: "Salsa night", category: "nightlife" },
  { type: "🏄", label: "Surf lesson", category: "outdoors" },
  { type: "🎸", label: "Live music venue", category: "nightlife" },
  { type: "🧘", label: "Rooftop yoga", category: "wellness" },
  { type: "⚽", label: "5-a-side football", category: "sports" },
  { type: "🥾", label: "Guided nature walk", category: "outdoors" },
  { type: "🎯", label: "Axe throwing night", category: "nightlife" },
  { type: "🏃", label: "Running club meetup", category: "sports" },
];

const getActivitiesForCity = (city, userProfile) => {
  const seed = city.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
  const userActivities = userProfile?.activities || [];

  // Sort activities so ones matching user preferences come first
  const sorted = [...ACTIVITY_TEMPLATES].sort((a, b) => {
    const aMatch = userActivities.includes(a.category) ? 0 : 1;
    const bMatch = userActivities.includes(b.category) ? 0 : 1;
    if (aMatch !== bMatch) return aMatch - bMatch;
    return ((seed * (ACTIVITY_TEMPLATES.indexOf(a) + 1)) % 7) - ((seed * (ACTIVITY_TEMPLATES.indexOf(b) + 1)) % 7);
  });

  return sorted.slice(0, 5).map((a, i) => {
    const isMatch = userActivities.includes(a.category);
    return {
      ...a,
      match: isMatch ? 95 - i * 2 : 78 - i * 3,
      people: Math.floor(2 + (seed + i) % 8),
      city,
    };
  });
};

const getPeopleForPlace = (place, userProfile) => {
  const seed = place.name.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
  const userPrefs = new Set([...(userProfile?.foodProfile || []), ...(userProfile?.activities || [])]);

  // Sort people by shared interest overlap with this user
  return [...PEOPLE_POOL]
    .sort((a, b) => {
      const aOverlap = a.shared.filter(s => userPrefs.has(s)).length;
      const bOverlap = b.shared.filter(s => userPrefs.has(s)).length;
      if (bOverlap !== aOverlap) return bOverlap - aOverlap;
      return ((seed * (PEOPLE_POOL.indexOf(a) + 1)) % 11) - ((seed * (PEOPLE_POOL.indexOf(b) + 1)) % 11);
    })
    .slice(0, 4);
};

const emojiFor = (cats = []) => {
  const s = (Array.isArray(cats) ? cats.map(c => typeof c === 'string' ? c : c.name || '').join(" ") : "").toLowerCase();
  if (s.includes("coffee") || s.includes("cafe")) return "☕";
  if (s.includes("cocktail") || s.includes("wine") || s.includes("bar")) return "🍷";
  if (s.includes("restaurant") || s.includes("dining") || s.includes("food")) return "🍽️";
  if (s.includes("park") || s.includes("garden") || s.includes("nature") || s.includes("hiking")) return "🌿";
  if (s.includes("museum") || s.includes("art") || s.includes("gallery")) return "🎨";
  if (s.includes("market")) return "🛍️";
  if (s.includes("music") || s.includes("jazz") || s.includes("club") || s.includes("night")) return "🎵";
  if (s.includes("bakery") || s.includes("pastry")) return "🥐";
  if (s.includes("sport") || s.includes("gym") || s.includes("fitness") || s.includes("climbing") || s.includes("stadium")) return "⚽";
  if (s.includes("spa") || s.includes("wellness") || s.includes("yoga")) return "🧘";
  if (s.includes("landmark") || s.includes("attraction") || s.includes("historic") || s.includes("tourist")) return "🏛️";
  if (s.includes("theatre") || s.includes("theater") || s.includes("cinema") || s.includes("performing")) return "🎭";
  if (s.includes("church") || s.includes("mosque") || s.includes("temple") || s.includes("synagogue")) return "⛪";
  if (s.includes("zoo") || s.includes("aquarium")) return "🐾";
  if (s.includes("library")) return "📚";
  return "✦";
};

/* ─── API calls ──────────────────────────────────────────────────── */
const PROXY = "https://honest-review-proxy-production.up.railway.app";

async function searchPlaces(city, category = "all") {
  const res = await fetch(
    `${PROXY}/places?city=${encodeURIComponent(city)}&category=${encodeURIComponent(category)}&limit=10`,
    { cache: "no-store" }
  );
  if (!res.ok) throw new Error(`Error ${res.status}`);
  const data = await res.json();
  return data.results || [];
}

async function synthesiseReview(place, userProfile) {
  const cats = (place.categories || []).map(c => c.name).join(", ") || "venue";
  const loc = [place.location?.locality, place.location?.country].filter(Boolean).join(", ");
  const score = matchScore(place, userProfile);
  const prompt = `You are Honest Review — write a personalised, genuinely honest venue summary.
Venue: ${place.name}
Location: ${loc}
Category: ${cats}
Rating: ${place.rating ? `${place.rating}/5` : "unknown"} (${place.stats?.total_ratings?.toLocaleString() || "?"} ratings)
Match score: ${score}% for this user

User profile:
- Name: ${userProfile.name || "Traveller"}
- Persona: ${userProfile.persona || "Explorer"}
- Home city: ${userProfile.homeCity || "unknown"}
- Food interests: ${(userProfile.foodProfile || []).join(", ") || "not specified"}
- Activity interests: ${(userProfile.activities || []).join(", ") || "not specified"}
- Trust signals: ${(userProfile.trustSignals || []).join(", ") || "balanced"}

Write 3 sentences: what the place is really like, why it specifically fits (or doesn't fit) THIS user based on their profile, and one candid observation. Reference their specific interests where relevant. Then on a new line "✓ Tip:" with one practical tip. Max 110 words. No generic praise — be honest.`;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514", max_tokens: 200,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  const data = await res.json();
  return data.content?.[0]?.text || "Review unavailable.";
}

/* ═══════════════════════════════════════════════════════════════════
   ONBOARDING QUESTIONNAIRE
   4 steps: Name/City → Food → Activities → Trust Signals
   Results stored in userProfile state and used everywhere
   ═══════════════════════════════════════════════════════════════════ */
function OnboardingScreen({ onComplete }) {
  const [step, setStep] = React.useState(0);
  const [name, setName] = React.useState("");
  const [homeCity, setHomeCity] = React.useState("");
  const [foodProfile, setFoodProfile] = React.useState([]);
  const [activities, setActivities] = React.useState([]);
  const [trustSignals, setTrustSignals] = React.useState([]);

  const toggleItem = (list, setList, item) => {
    setList(prev => prev.includes(item) ? prev.filter(x => x !== item) : [...prev, item]);
  };

  const canAdvance = () => {
    if (step === 0) return name.trim().length > 0;
    if (step === 1) return foodProfile.length > 0;
    if (step === 2) return activities.length > 0;
    if (step === 3) return trustSignals.length > 0;
    return true;
  };

  const handleFinish = () => {
    const persona = derivePersona(foodProfile, activities);
    onComplete({
      name: name.trim(),
      homeCity: homeCity.trim() || "Unknown",
      foodProfile,
      activities,
      trustSignals,
      persona,
    });
  };

  const Chip = ({ label, emoji, selected, onClick }) => (
    <button onClick={onClick} style={{
      background: selected ? C.accent + "22" : C.card,
      border: `1px solid ${selected ? C.accent : C.border}`,
      borderRadius: 12, padding: "12px 16px", cursor: "pointer",
      display: "flex", alignItems: "center", gap: 8,
      transition: "all 0.15s", flex: "1 1 calc(50% - 5px)", minWidth: 0,
    }}>
      <span style={{ fontSize: 18 }}>{emoji}</span>
      <span style={{ fontSize: 13, color: selected ? C.accent : C.text, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{label}</span>
    </button>
  );

  const stepCount = 4;
  const progress = ((step + 1) / stepCount) * 100;

  return (
    <div style={{ maxWidth: 430, margin: "0 auto", padding: "32px 24px", minHeight: "100vh", display: "flex", flexDirection: "column" }}>
      {/* Progress bar */}
      <div style={{ display: "flex", gap: 4, marginBottom: 32 }}>
        {Array.from({ length: stepCount }).map((_, i) => (
          <div key={i} style={{ flex: 1, height: 3, borderRadius: 2, background: i <= step ? C.accent : C.faint, transition: "background 0.3s" }} />
        ))}
      </div>

      <div style={{ flex: 1, animation: "fadeUp 0.35s ease" }} key={step}>
        {step === 0 && (
          <>
            <div style={{ fontSize: 38, marginBottom: 16 }}>✦</div>
            <h2 style={{ fontFamily: fd, fontWeight: 400, fontSize: 26, color: C.text, marginBottom: 8 }}>Welcome to Honest Review</h2>
            <p style={{ color: C.muted, fontSize: 14, lineHeight: 1.7, marginBottom: 32 }}>Tell us a bit about yourself so we can find places that actually fit you.</p>
            <label style={{ fontSize: 12, color: C.muted, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8, display: "block" }}>Your name</label>
            <input value={name} onChange={e => setName(e.target.value)}
              placeholder="e.g. Phil"
              style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px 16px", fontSize: 15, color: C.text, fontFamily: fb, outline: "none", marginBottom: 20 }} />
            <label style={{ fontSize: 12, color: C.muted, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8, display: "block" }}>Home city</label>
            <input value={homeCity} onChange={e => setHomeCity(e.target.value)}
              placeholder="e.g. Berlin"
              style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px 16px", fontSize: 15, color: C.text, fontFamily: fb, outline: "none" }} />
          </>
        )}

        {step === 1 && (
          <>
            <p style={{ fontSize: 11, color: C.accent, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 6 }}>Step 2 of 4</p>
            <h2 style={{ fontFamily: fd, fontWeight: 400, fontSize: 24, color: C.text, marginBottom: 8 }}>What do you love eating?</h2>
            <p style={{ color: C.muted, fontSize: 13, lineHeight: 1.6, marginBottom: 24 }}>Pick all that apply — this shapes which places we surface.</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
              {[
                { id: "local", emoji: "🍜", label: "Local cuisine" },
                { id: "streetfood", emoji: "🌮", label: "Street food" },
                { id: "wine", emoji: "🍷", label: "Wine & cocktails" },
                { id: "coffee", emoji: "☕", label: "Coffee & cafés" },
                { id: "finedining", emoji: "🍽️", label: "Fine dining" },
                { id: "vegan", emoji: "🥗", label: "Vegan / plant-based" },
              ].map(item => (
                <Chip key={item.id} label={item.label} emoji={item.emoji}
                  selected={foodProfile.includes(item.id)}
                  onClick={() => toggleItem(foodProfile, setFoodProfile, item.id)} />
              ))}
            </div>
          </>
        )}

        {step === 2 && (
          <>
            <p style={{ fontSize: 11, color: C.accent, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 6 }}>Step 3 of 4</p>
            <h2 style={{ fontFamily: fd, fontWeight: 400, fontSize: 24, color: C.text, marginBottom: 8 }}>What do you love doing?</h2>
            <p style={{ color: C.muted, fontSize: 13, lineHeight: 1.6, marginBottom: 24 }}>Pick your favourite activities — this filters what we show you.</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
              {[
                { id: "culture", emoji: "🎨", label: "Culture & arts" },
                { id: "nightlife", emoji: "🎵", label: "Nightlife & music" },
                { id: "nature", emoji: "🌿", label: "Nature & parks" },
                { id: "sports", emoji: "⚽", label: "Sports & fitness" },
                { id: "outdoors", emoji: "🥾", label: "Outdoor adventure" },
                { id: "shopping", emoji: "🛍️", label: "Shopping & markets" },
              ].map(item => (
                <Chip key={item.id} label={item.label} emoji={item.emoji}
                  selected={activities.includes(item.id)}
                  onClick={() => toggleItem(activities, setActivities, item.id)} />
              ))}
            </div>
          </>
        )}

        {step === 3 && (
          <>
            <p style={{ fontSize: 11, color: C.accent, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 6 }}>Step 4 of 4</p>
            <h2 style={{ fontFamily: fd, fontWeight: 400, fontSize: 24, color: C.text, marginBottom: 8 }}>How do you pick places?</h2>
            <p style={{ color: C.muted, fontSize: 13, lineHeight: 1.6, marginBottom: 24 }}>What matters most when deciding — this tunes how we rank results.</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
              {[
                { id: "similar", emoji: "👥", label: "People like me went" },
                { id: "critical", emoji: "🧐", label: "Honest, critical reviews" },
                { id: "popular", emoji: "🔥", label: "Popular & well-known" },
                { id: "hidden", emoji: "💎", label: "Hidden gems" },
              ].map(item => (
                <Chip key={item.id} label={item.label} emoji={item.emoji}
                  selected={trustSignals.includes(item.id)}
                  onClick={() => toggleItem(trustSignals, setTrustSignals, item.id)} />
              ))}
            </div>
          </>
        )}
      </div>

      {/* Navigation buttons */}
      <div style={{ display: "flex", gap: 10, marginTop: 32, paddingBottom: 20 }}>
        {step > 0 && (
          <button onClick={() => setStep(s => s - 1)} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: "15px 24px", fontSize: 14, color: C.muted, cursor: "pointer" }}>
            Back
          </button>
        )}
        <button
          onClick={() => step < 3 ? setStep(s => s + 1) : handleFinish()}
          disabled={!canAdvance()}
          style={{
            flex: 1, background: canAdvance() ? C.accent : C.faint,
            border: "none", borderRadius: 12, padding: "15px",
            fontSize: 14, fontWeight: 500, cursor: canAdvance() ? "pointer" : "default",
            color: canAdvance() ? "#000" : C.muted, transition: "all 0.2s",
          }}>
          {step < 3 ? "Continue" : "Start exploring →"}
        </button>
      </div>
    </div>
  );
}

function SearchScreen({ onSelectPlace, connected, initialCity, userProfile }) {
  const [query, setQuery] = React.useState(initialCity || "");
  const [activeCategory, setActiveCategory] = React.useState("all");
  const [results, setResults] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [hasSearched, setHasSearched] = React.useState(false);
  const [currentCity, setCurrentCity] = React.useState(initialCity || "");
  const lastSearch = React.useRef("");

  const categories = [
    { id: "all", label: "All" },
    { id: "food", label: "🍽 Food" },
    { id: "nightlife", label: "🎵 Nightlife" },
    { id: "outdoors", label: "🌿 Outdoors" },
    { id: "culture", label: "🎨 Culture" },
    { id: "sports", label: "⚽ Sports" },
  ];

  const chips = ["Vienna", "Lisbon", "Tokyo", "Barcelona", "Berlin", "Seoul", "NYC", "Lagos"];

  const doSearch = async (city, cat) => {
    const key = `${city}-${cat}`;
    if (lastSearch.current === key) return;
    lastSearch.current = key;
    setLoading(true); setError(null); setResults([]); setHasSearched(true); setCurrentCity(city);
    try {
      const places = await searchPlaces(city, cat);
      if (!places.length) setError("No results found. Try a different city.");
      else {
        // Sort results by match score (uses user profile)
        const scored = places.map(p => ({ ...p, _score: matchScore(p, userProfile) }));
        scored.sort((a, b) => b._score - a._score);
        setResults(scored);
      }
    } catch (e) { setError(e.message || "Something went wrong."); }
    finally { setLoading(false); }
  };

  React.useEffect(() => {
    if (initialCity) doSearch(initialCity, "all");
  }, []);

  const handleSearch = () => { if (query.trim()) doSearch(query.trim(), activeCategory); };
  const handleChip = (city) => { setQuery(city); lastSearch.current = ""; setTimeout(() => doSearch(city, activeCategory), 50); };
  const handleCategory = (cat) => { setActiveCategory(cat); lastSearch.current = ""; if (hasSearched && currentCity) setTimeout(() => doSearch(currentCity, cat), 50); };

  return (
    <div style={{ paddingBottom: 90 }}>
      <div style={{ padding: "24px 20px 0" }}>
        <h2 style={{ fontSize: 22, fontFamily: fd, fontWeight: 400, color: C.text, marginBottom: 20 }}>Explore</h2>

            <span style={{ color: C.muted }}>🔍</span>
            <input value={query} onChange={e => { setQuery(e.target.value); lastSearch.current = ""; }}
              onKeyDown={e => e.key === "Enter" && handleSearch()}
              placeholder="Search any city..."
              style={{ background: "none", border: "none", outline: "none", fontSize: 15, color: C.text, flex: 1, fontFamily: fb }} />
            {query && <button onClick={() => { setQuery(""); setResults([]); setHasSearched(false); setError(null); lastSearch.current = ""; }} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer", fontSize: 18, padding: 0 }}>×</button>}
          </div>
          <button onClick={handleSearch} disabled={loading || !query.trim()}
            style={{ background: query.trim() && !loading ? C.accent : C.faint, border: "none", borderRadius: 12, padding: "0 18px", cursor: query.trim() && !loading ? "pointer" : "default", fontSize: 14, fontWeight: 500, color: query.trim() && !loading ? "#000" : C.muted, transition: "all 0.15s", minWidth: 56 }}>
            {loading ? "···" : "Go"}
          </button>
        </div>
        <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 8 }}>
          {chips.map(c => (
            <button key={c} onClick={() => handleChip(c)}
              style={{ background: currentCity === c ? C.accent + "22" : C.faint, border: `1px solid ${currentCity === c ? C.accent + "44" : C.border}`, borderRadius: 20, padding: "5px 13px", fontSize: 12, color: currentCity === c ? C.accent : C.muted, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>
              {c}
            </button>
          ))}
        </div>
        <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4, marginTop: 10 }}>
          {categories.map(cat => (
            <button key={cat.id} onClick={() => handleCategory(cat.id)}
              style={{ background: activeCategory === cat.id ? C.accent : C.surface, border: `1px solid ${activeCategory === cat.id ? C.accent : C.border}`, borderRadius: 20, padding: "6px 14px", fontSize: 12, color: activeCategory === cat.id ? "#000" : C.muted, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0, transition: "all 0.15s" }}>
              {cat.label}

          ))}
        </div>
      </div>
      <div style={{ padding: "16px 20px 0" }}>
        {loading && <Spinner label="Finding places..." />}
        {!loading && error && <div style={{ background: "#1a0d0d", border: "1px solid #3a1a1a", borderRadius: 14, padding: "16px" }}><p style={{ color: "#e07b7b", fontSize: 13 }}>{error}</p></div>}
        {!loading && !error && results.length > 0 && (

            <p style={{ fontSize: 12, color: C.muted, marginBottom: 14 }}>{results.length} places in {currentCity} · ranked by your profile</p>
            {results.map((place, i) => {
              const cats = (place.categories || []).map(c => c.name).join(" · ") || "Venue";
              const loc = place.location?.formatted_address || [place.location?.locality, place.location?.country].filter(Boolean).join(", ");
              const score = place._score || matchScore(place, userProfile);
              const people = getPeopleForPlace(place, userProfile);
              return (
                <div key={place.fsq_id || i} onClick={() => onSelectPlace(place, currentCity)}
                  style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: "16px", cursor: "pointer", marginBottom: 10, animation: `fadeUp 0.35s ease ${i * 0.05}s both` }}>

                        <p style={{ fontSize: 15, fontFamily: fd, color: C.text, marginBottom: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{place.name}</p>
                        <p style={{ fontSize: 11, color: C.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{cats}</p>
                      </div>
                    </div>
                    <div style={{ flexShrink: 0, marginLeft: 8 }}>
                      <MatchBadge score={score} />
                    </div>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 12, color: C.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: "60%" }}>📍 {loc || "—"}</span>
                    <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                      {place.rating && <span style={{ fontSize: 12, color: C.green }}>★ {place.rating.toFixed(1)}</span>}
                      <div style={{ display: "flex" }}>
                        {people.slice(0, 3).map((p, idx) => (
                          <div key={idx} style={{ width: 20, height: 20, borderRadius: "50%", background: connected[p.initials] ? C.accent + "33" : C.faint, border: `1px solid ${connected[p.initials] ? C.accent : C.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 8, color: C.muted, marginLeft: idx > 0 ? -6 : 0 }}>

                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
        {!loading && !hasSearched && (
          <div style={{ textAlign: "center", padding: "52px 20px" }}>
            <div style={{ fontSize: 36, marginBottom: 14, opacity: 0.3 }}>✦</div>

            <p style={{ fontSize: 13, color: C.muted, lineHeight: 1.6 }}>Search any city — real venues, honest AI reviews, ranked by your taste profile.</p>
          </div>
        )}
      </div>
    </div>
  );

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <button onClick={onBack} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 14px", cursor: "pointer", fontSize: 13, color: C.muted }}>← Back</button>
          <button onClick={() => onSave(place)} style={{ background: isSaved ? C.pink + "22" : "none", border: `1px solid ${isSaved ? C.pink : C.border}`, borderRadius: 8, padding: "8px 16px", cursor: "pointer", fontSize: 18, color: isSaved ? C.pink : C.muted, transition: "all 0.2s" }}>
            {isSaved ? "♥" : "♡"}
          </button>
        </div>
        <span style={{ fontSize: 40 }}>{emojiFor(place.categories)}</span>
        <h1 style={{ fontSize: 24, fontFamily: fd, fontWeight: 400, color: C.text, margin: "10px 0 4px" }}>{place.name}</h1>
        <p style={{ fontSize: 13, color: C.muted, marginBottom: 4 }}>{(place.categories || []).map(c => c.name).join(" · ")}</p>
        <p style={{ fontSize: 12, color: C.muted, marginBottom: 20 }}>📍 {place.location?.formatted_address || [place.location?.locality, place.location?.country].filter(Boolean).join(", ")}</p>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 20 }}>
          {[
            { label: "Rating", val: place.rating ? `${place.rating}/5` : "—", color: C.text },
            { label: "Reviews", val: place.stats?.total_ratings ? place.stats.total_ratings.toLocaleString() : "—", color: C.text },
            { label: "Match", val: `${score}%`, color: C.accent },
          ].map(stat => (
            <div key={stat.label} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "13px 10px", textAlign: "center" }}>
              <p style={{ fontSize: 16, fontFamily: fd, color: stat.color, marginBottom: 4 }}>{stat.val}</p>
              <p style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: "0.08em" }}>{stat.label}</p>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", borderBottom: `1px solid ${C.border}`, marginBottom: 20 }}>
          {["review", "people", "doing"].map(t => (
            <button key={t} onClick={() => setDetailTab(t)} style={{ background: "none", border: "none", borderBottom: detailTab === t ? `2px solid ${C.accent}` : "2px solid transparent", padding: "10px 16px", cursor: "pointer", fontSize: 13, color: detailTab === t ? C.accent : C.muted, textTransform: "capitalize", letterSpacing: "0.05em", transition: "all 0.15s" }}>
              {t === "doing" ? "Others doing" : t}
            </button>
          ))}
        </div>
        {detailTab === "review" && (
          <div style={{ background: "linear-gradient(135deg,#141408,#101008)", border: `1px solid ${C.accent}22`, borderRadius: 16, padding: "18px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
              <span>✦</span>
              <span style={{ fontSize: 11, color: C.accent, letterSpacing: "0.12em", textTransform: "uppercase" }}>Honest Review · AI Synthesis</span>
            </div>
            {aiLoading
              ? <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ width: 16, height: 16, border: `2px solid ${C.faint}`, borderTop: `2px solid ${C.accent}`, borderRadius: "50%", animation: "spin 0.8s linear infinite", flexShrink: 0 }} />
                  <p style={{ fontSize: 13, color: C.muted }}>Synthesising for your taste profile...</p>
                </div>
              : <>
                  <p style={{ fontSize: 14, color: C.text, lineHeight: 1.75, marginBottom: tipLine ? 14 : 0 }}>{reviewBody}</p>
                  {tipLine && <div style={{ background: "#0d1a0d", border: "1px solid #1a3a1a", borderRadius: 8, padding: "10px 14px" }}>
                    <p style={{ fontSize: 13, color: C.green }}>{tipLine}</p>
                  </div>}
                </>
            }
          </div>
        )}
        {detailTab === "people" && (
          <div>
            <p style={{ fontSize: 13, color: C.muted, marginBottom: 16, lineHeight: 1.6 }}>Travellers who share your taste profile and visited this place.</p>
            {peopleForPlace.map((person, i) => <PersonCard key={i} person={person} connected={!!connected[person.initials]} onConnect={onConnect} />)}
            {connectedCount > 0 && (
              <div style={{ marginTop: 8, background: C.pink + "15", border: `1px solid ${C.pink}33`, borderRadius: 12, padding: "12px 16px" }}>
                <p style={{ fontSize: 13, color: C.pink }}>✓ {connectedCount} connection{connectedCount > 1 ? "s" : ""} made — they'll be notified when you're in their city.</p>
              </div>
            )}
          </div>
        )}
        {detailTab === "doing" && (
          <div>
            <p style={{ fontSize: 13, color: C.muted, marginBottom: 16, lineHeight: 1.6 }}>People with your taste profile are also doing these in {city || "this city"}.</p>
            {activities.map((a, i) => (
              <div key={i} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "14px 16px", display: "flex", alignItems: "center", gap: 14, marginBottom: 10 }}>
                <span style={{ fontSize: 28, flexShrink: 0 }}>{a.type}</span>
                <div style={{ flex: 1 }}>
                  <p style={{ fontSize: 14, fontFamily: fd, color: C.text, marginBottom: 4 }}>{a.label}</p>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <MatchBadge score={a.match} />
                    <span style={{ fontSize: 11, color: C.muted }}>{a.people} people going</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   APP ROOT
   ═══════════════════════════════════════════════════════════════════ */
/* ─── localStorage helpers ────────────────────────────────────────── */
function loadFromStorage(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function saveToStorage(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

function App() {
  // Load persisted data on first render
  const storedProfile = React.useMemo(() => loadFromStorage("hr_profile", null), []);
  const storedSaved = React.useMemo(() => loadFromStorage("hr_saved", []), []);
  const storedConnected = React.useMemo(() => loadFromStorage("hr_connected", {}), []);

  const [appScreen, setAppScreen] = React.useState(storedProfile ? "main" : "onboarding");
  const [navTab, setNavTab] = React.useState("discover");
  const [selectedPlace, setSelectedPlace] = React.useState(null);
  const [selectedCity, setSelectedCity] = React.useState("");
  const [prevTab, setPrevTab] = React.useState("discover");
  const [connected, setConnected] = React.useState(storedConnected);
  const [saved, setSaved] = React.useState(storedSaved);
  const [searchInitialCity, setSearchInitialCity] = React.useState("");
  const [userProfile, setUserProfile] = React.useState(storedProfile || DEFAULT_USER);

  // Persist profile, saved, and connections when they change
  React.useEffect(() => { if (userProfile.name) saveToStorage("hr_profile", userProfile); }, [userProfile]);
  React.useEffect(() => { saveToStorage("hr_saved", saved); }, [saved]);
  React.useEffect(() => { saveToStorage("hr_connected", connected); }, [connected]);

  const activities = getActivitiesForCity(selectedCity || "Vienna", userProfile);

  const handleConnect = (initials) => setConnected(p => ({ ...p, [initials]: !p[initials] }));
  const handleSave = (place) => setSaved(prev => prev.some(s => s.fsq_id === place.fsq_id) ? prev.filter(s => s.fsq_id !== place.fsq_id) : [...prev, place]);

  const handleSelectPlace = (place, city) => {
    setSelectedPlace(place); setSelectedCity(city);
    setPrevTab(navTab); setAppScreen("detail");
  };

  const handleNav = (tab, city) => {
    if (city) { setSearchInitialCity(city); setNavTab("search"); }
    else { setNavTab(tab); setSearchInitialCity(""); }
    setAppScreen("main");
  };

  const handleOnboardingComplete = (profile) => {
    setUserProfile(profile);
    setAppScreen("main");
  };

  const handleEditProfile = () => {
    setAppScreen("onboarding");
  };

  // Onboarding
  if (appScreen === "onboarding") return (
    <OnboardingScreen onComplete={handleOnboardingComplete} />
  );

  // Detail view
  if (appScreen === "detail" && selectedPlace) return (
    <div style={{ maxWidth: 430, margin: "0 auto", background: C.bg, minHeight: "100vh" }}>
      <DetailScreen place={selectedPlace} city={selectedCity} onBack={() => { setAppScreen("main"); setNavTab(prevTab); }} connected={connected} onConnect={handleConnect} onSave={handleSave} saved={saved} userProfile={userProfile} />
      <GoogleAttribution />
      <BottomNav active={prevTab} onNav={handleNav} />
    </div>
  );

  // Main app
  return (
    <div style={{ maxWidth: 430, margin: "0 auto", background: C.bg, minHeight: "100vh" }}>
      {navTab === "discover" && <DiscoverScreen onSelectPlace={handleSelectPlace} onNav={handleNav} connected={connected} currentCity={selectedCity} activities={activities} userProfile={userProfile} />}
      {navTab === "search" && <SearchScreen key={searchInitialCity} onSelectPlace={handleSelectPlace} connected={connected} initialCity={searchInitialCity} userProfile={userProfile} />}
      {navTab === "saved" && <SavedScreen saved={saved} onSelectPlace={handleSelectPlace} />}
      {navTab === "profile" && <ProfileScreen connected={connected} saved={saved} userProfile={userProfile} onEditProfile={handleEditProfile} />}
      <GoogleAttribution />
      <BottomNav active={navTab} onNav={handleNav} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
