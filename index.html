<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Honest Review</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #0A0A0A; font-family: 'DM Sans', system-ui, sans-serif; }
    input::placeholder { color: #666; }
    ::-webkit-scrollbar { display: none; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const C = {
  bg: "#0A0A0A", surface: "#141414", card: "#1A1A1A",
  border: "#242424", accent: "#E8FF47", text: "#F2F0EB",
  muted: "#666", faint: "#282828", green: "#7bc47b", pink: "#ff7eb3",
};
const fd = "'Playfair Display', Georgia, serif";
const fb = "'DM Sans', system-ui, sans-serif";

const USER = {
  name: "Phil", persona: "The Urban Explorer", homeCity: "Berlin",
  foodProfile: ["local", "wine", "streetfood"],
  activities: ["culture", "nightlife", "nature"],
  trustSignals: ["similar", "critical", "recency"],
};

const CATEGORY_QUERIES = {
  all: [
    "things to do attractions landmarks",
    "parks hiking outdoor activities",
    "museums galleries cultural sites",
    "live music nightlife venues",
    "sports fitness climbing",
    "local markets street food",
  ],
  food: [
    "local food markets street food",
    "authentic restaurants local cuisine",
    "wine bars local specialties",
    "food halls dining experiences",
  ],
  nightlife: [
    "nightlife clubs live music venues",
    "jazz bars cocktail bars",
    "underground music clubs",
    "rooftop bars evening venues",
  ],
  outdoors: [
    "hiking trails nature parks",
    "outdoor activities parks gardens",
    "cycling routes outdoor sports",
    "beaches lakes outdoor swimming",
  ],
  culture: [
    "museums art galleries",
    "theatres cultural centres",
    "historical sites landmarks",
    "street art architecture tours",
  ],
  sports: [
    "sports centres gyms climbing walls",
    "football tennis sports facilities",
    "yoga wellness fitness studios",
    "swimming pools sports activities",
  ],
};

const getSearchQuery = (category, city) => {
  const queries = CATEGORY_QUERIES[category] || CATEGORY_QUERIES.all;
  const seed = city.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
  const q = queries[seed % queries.length];
  return `${q} in ${city}`;
};

const PEOPLE_POOL = [
  { initials: "MK", name: "Min-jun K.", city: "Seoul", persona: "The Culture Seeker", shared: ["culture", "nightlife"] },
  { initials: "AR", name: "Ana R.", city: "São Paulo", persona: "The Urban Explorer", shared: ["local", "streetfood"] },
  { initials: "LN", name: "Lena N.", city: "Tokyo", persona: "The Convivial Host", shared: ["wine", "culture"] },
  { initials: "FD", name: "Felix D.", city: "Paris", persona: "The Urban Explorer", shared: ["local", "wine"] },
  { initials: "YK", name: "Yuki K.", city: "Kyoto", persona: "The Contemplative", shared: ["culture", "nature"] },
  { initials: "SK", name: "Sara K.", city: "Stockholm", persona: "The Active Adventurer", shared: ["nature", "culture"] },
  { initials: "MT", name: "Marco T.", city: "Milan", persona: "The Convivial Host", shared: ["wine", "local"] },
  { initials: "BJ", name: "Bayo J.", city: "Lagos", persona: "The Urban Explorer", shared: ["nightlife", "streetfood"] },
  { initials: "CR", name: "Clara R.", city: "NYC", persona: "The Culture Seeker", shared: ["culture", "wine"] },
  { initials: "OB", name: "Omar B.", city: "Casablanca", persona: "The Urban Explorer", shared: ["local", "streetfood"] },
  { initials: "HW", name: "Hana W.", city: "Vienna", persona: "The Contemplative", shared: ["culture", "nature"] },
  { initials: "JP", name: "Jess P.", city: "Sydney", persona: "The Active Adventurer", shared: ["nature", "nightlife"] },
];

const ACTIVITY_TEMPLATES = [
  { type: "🧗", label: "Bouldering drop-in", category: "sports" },
  { type: "🎶", label: "Jazz club session", category: "nightlife" },
  { type: "🚴", label: "Dawn cycling route", category: "outdoors" },
  { type: "🏊", label: "Open water swim", category: "outdoors" },
  { type: "🎨", label: "Street art walking tour", category: "culture" },
  { type: "🍜", label: "Local food market", category: "food" },
  { type: "🌄", label: "Sunrise hike", category: "outdoors" },
  { type: "🎭", label: "Underground theatre", category: "culture" },
  { type: "🕺", label: "Salsa night", category: "nightlife" },
  { type: "🏄", label: "Surf lesson", category: "outdoors" },
  { type: "🎸", label: "Live music venue", category: "nightlife" },
  { type: "🧘", label: "Rooftop yoga", category: "wellness" },
  { type: "⚽", label: "5-a-side football", category: "sports" },
  { type: "🥾", label: "Guided nature walk", category: "outdoors" },
  { type: "🎯", label: "Axe throwing night", category: "nightlife" },
  { type: "🏃", label: "Running club meetup", category: "sports" },
];

const getActivitiesForCity = (city) => {
  const seed = city.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
  const shuffled = [...ACTIVITY_TEMPLATES].sort((a, b) =>
    ((seed * (ACTIVITY_TEMPLATES.indexOf(a) + 1)) % 7) - ((seed * (ACTIVITY_TEMPLATES.indexOf(b) + 1)) % 7)
  );
  return shuffled.slice(0, 5).map((a, i) => ({
    ...a, match: 95 - i * 3, people: Math.floor(2 + (seed + i) % 8), city,
  }));
};

const getPeopleForPlace = (place) => {
  const seed = place.name.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
  return [...PEOPLE_POOL]
    .sort((a, b) => ((seed * (PEOPLE_POOL.indexOf(a) + 1)) % 11) - ((seed * (PEOPLE_POOL.indexOf(b) + 1)) % 11))
    .slice(0, 4);
};

const emojiFor = (cats = []) => {
  const s = cats.join(" ").toLowerCase();
  if (s.includes("coffee") || s.includes("cafe")) return "☕";
  if (s.includes("cocktail") || s.includes("wine") || s.includes("bar")) return "🍷";
  if (s.includes("restaurant") || s.includes("dining") || s.includes("food")) return "🍽️";
  if (s.includes("park") || s.includes("garden") || s.includes("nature") || s.includes("hiking")) return "🌿";
  if (s.includes("museum") || s.includes("art") || s.includes("gallery")) return "🎨";
  if (s.includes("market")) return "🛍️";
  if (s.includes("music") || s.includes("jazz") || s.includes("club") || s.includes("night")) return "🎵";
  if (s.includes("bakery") || s.includes("pastry")) return "🥐";
  if (s.includes("sport") || s.includes("gym") || s.includes("fitness") || s.includes("climbing")) return "⚽";
  if (s.includes("spa") || s.includes("wellness") || s.includes("yoga")) return "🧘";
  if (s.includes("landmark") || s.includes("attraction") || s.includes("historic")) return "🏛️";
  if (s.includes("theatre") || s.includes("cinema")) return "🎭";
  return "✦";
};

const matchScore = (place) => {
  let score = 72;
  const cats = (place.categories || []).map(c => (c.name || "").toLowerCase()).join(" ");
  if (cats.includes("wine") || cats.includes("bar")) score += 10;
  if (place.stats?.total_ratings > 300) score += 7;
  if (cats.includes("market")) score += 8;
  if (cats.includes("museum") || cats.includes("art") || cats.includes("gallery")) score += 10;
  if (cats.includes("club") || cats.includes("music")) score += 9;
  if (cats.includes("park") || cats.includes("garden") || cats.includes("nature")) score += 8;
  if (cats.includes("sport") || cats.includes("fitness") || cats.includes("climbing")) score += 7;
  if (place.rating >= 4.5) score += 8;
  else if (place.rating >= 4.0) score += 5;
  return Math.min(score, 99);
};

const PROXY = "https://honest-review-proxy-production.up.railway.app";

async function searchPlaces(query) {
  const res = await fetch(`${PROXY}/places?query=${encodeURIComponent(query)}`, { cache: "no-store" });
  if (!res.ok) throw new Error(`Error ${res.status}`);
  const data = await res.json();
  return data.results || [];
}

async function synthesiseReview(place, user) {
  const cats = (place.categories || []).map(c => c.name).join(", ") || "venue";
  const loc = [place.location?.locality, place.location?.country].filter(Boolean).join(", ");
  const prompt = `You are Honest Review — write a personalised, genuinely honest venue summary.
Venue: ${place.name}
Location: ${loc}
Category: ${cats}
Rating: ${place.rating ? `${place.rating}/5` : "unknown"} (${place.stats?.total_ratings?.toLocaleString() || "?"} ratings)
User: ${user.persona} · food: ${user.foodProfile.join(", ")} · activities: ${user.activities.join(", ")}
Write 3 sentences: what the place is really like, why it fits this user, and one candid observation. Then on a new line "✓ Tip:" with one practical tip. Max 110 words. No generic praise.`;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514", max_tokens: 200,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  const data = await res.json();
  return data.content?.[0]?.text || "Review unavailable.";
}

function MatchBadge({ score }) {
  const color = score >= 90 ? C.accent : score >= 82 ? "#a8d8a8" : "#d8c8a8";
  return <div style={{ background: color + "22", border: `1px solid ${color}44`, borderRadius: 20, padding: "3px 10px", fontSize: 11, color, letterSpacing: "0.05em", whiteSpace: "nowrap" }}>{score}% match</div>;
}

function Spinner({ label }) {
  return <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "48px 0", gap: 14 }}>
    <div style={{ width: 26, height: 26, border: `2px solid ${C.faint}`, borderTop: `2px solid ${C.accent}`, borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
    <p style={{ color: C.muted, fontSize: 13 }}>{label}</p>
  </div>;
}

function PersonCard({ person, connected, onConnect }) {
  return (
    <div style={{ background: C.card, border: `1px solid ${connected ? C.accent + "44" : C.border}`, borderRadius: 14, padding: "14px 16px", display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
      <div style={{ width: 42, height: 42, borderRadius: "50%", background: connected ? C.accent + "22" : C.faint, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 500, color: connected ? C.accent : C.muted, flexShrink: 0 }}>
        {person.initials}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <p style={{ marginBottom: 2, fontSize: 14, color: C.text }}>{person.name}</p>
        <p style={{ fontSize: 11, color: C.muted, marginBottom: 5 }}>📍 {person.city} · {person.persona}</p>
        <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
          {person.shared.map(s => <span key={s} style={{ fontSize: 10, color: C.accent, background: C.accent + "15", borderRadius: 4, padding: "2px 6px" }}>{s}</span>)}
        </div>
      </div>
      <button onClick={() => onConnect(person.initials)} style={{ background: connected ? C.accent : "none", border: `1px solid ${connected ? C.accent : C.border}`, borderRadius: 8, padding: "7px 12px", cursor: "pointer", fontSize: 12, color: connected ? "#000" : C.muted, whiteSpace: "nowrap", transition: "all 0.2s", flexShrink: 0 }}>
        {connected ? "✓ Connected" : "Connect"}
      </button>
    </div>
  );
}

function BottomNav({ active, onNav }) {
  const tabs = [
    { id: "discover", icon: "✦", label: "Discover" },
    { id: "search", icon: "⊕", label: "Explore" },
    { id: "saved", icon: "♡", label: "Saved" },
    { id: "profile", icon: "◎", label: "Profile" },
  ];
  return (
    <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: C.bg + "f5", backdropFilter: "blur(16px)", borderTop: `1px solid ${C.border}`, display: "flex", justifyContent: "space-around", padding: "10px 0 20px", zIndex: 100 }}>
      {tabs.map(tab => (
        <button key={tab.id} onClick={() => onNav(tab.id)} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, padding: "4px 16px" }}>
          <span style={{ fontSize: 18, color: active === tab.id ? C.accent : C.muted, transition: "color 0.15s" }}>{tab.icon}</span>
          <span style={{ fontSize: 10, color: active === tab.id ? C.accent : C.muted, letterSpacing: "0.08em", textTransform: "uppercase", transition: "color 0.15s" }}>{tab.label}</span>
        </button>
      ))}
    </div>
  );
}

function DiscoverScreen({ onSelectPlace, onNav, connected, currentCity, activities }) {
  const featuredCities = ["Vienna", "Tokyo", "Lisbon", "Barcelona", "Seoul", "Lagos"];
  return (
    <div style={{ paddingBottom: 90 }}>
      <div style={{ padding: "24px 20px 0" }}>
        <p style={{ fontSize: 11, color: C.muted, letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 3 }}>Good to see you</p>
        <h1 style={{ fontSize: 26, fontFamily: fd, fontWeight: 400, color: C.text, marginBottom: 20 }}>{USER.name} ✦</h1>
        <div style={{ background: "linear-gradient(135deg,#141408,#0d0d0a)", border: `1px solid ${C.accent}22`, borderRadius: 16, padding: "16px 18px", marginBottom: 24 }}>
          <p style={{ fontSize: 10, color: C.accent, letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 4 }}>Your Taste Persona</p>
          <p style={{ fontSize: 18, fontFamily: fd, color: C.text, marginBottom: 8 }}>{USER.persona}</p>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {[...USER.foodProfile, ...USER.activities].map(t => (
              <span key={t} style={{ fontSize: 11, color: C.muted, background: C.faint, borderRadius: 6, padding: "3px 8px" }}>{t}</span>
            ))}
          </div>
        </div>
        <p style={{ fontSize: 11, color: C.muted, marginBottom: 14, letterSpacing: "0.1em", textTransform: "uppercase" }}>Explore a city</p>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 28 }}>
          {featuredCities.map((city, i) => (
            <button key={city} onClick={() => onNav("search", city)}
              style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "16px", textAlign: "left", cursor: "pointer", animation: `fadeUp 0.35s ease ${i * 0.05}s both` }}>
              <p style={{ fontSize: 16, fontFamily: fd, color: C.text, marginBottom: 3 }}>{city}</p>
              <p style={{ fontSize: 11, color: C.muted }}>Tap to explore →</p>
            </button>
          ))}
        </div>
        {activities.length > 0 && (
          <>
            <p style={{ fontSize: 11, color: C.muted, marginBottom: 14, letterSpacing: "0.1em", textTransform: "uppercase" }}>What others are doing in {currentCity || "Vienna"}</p>
            <div style={{ display: "flex", gap: 10, overflowX: "auto", paddingBottom: 8 }}>
              {activities.map((a, i) => (
                <div key={i} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "14px", minWidth: 155, flexShrink: 0 }}>
                  <div style={{ fontSize: 24, marginBottom: 8 }}>{a.type}</div>
                  <p style={{ fontSize: 13, fontFamily: fd, color: C.text, marginBottom: 4 }}>{a.label}</p>
                  <p style={{ fontSize: 11, color: C.muted, marginBottom: 10 }}>{a.city}</p>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>

                    <span style={{ fontSize: 11, color: C.muted }}>{a.people} going</span>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>

}

function SearchScreen({ onSelectPlace, connected, initialCity }) {
  const [query, setQuery] = React.useState(initialCity || "");
  const [activeCategory, setActiveCategory] = React.useState("all");
  const [results, setResults] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [hasSearched, setHasSearched] = React.useState(false);
  const [currentCity, setCurrentCity] = React.useState(initialCity || "");
  const lastSearch = React.useRef("");

  const categories = [
    { id: "all", label: "All" },
    { id: "food", label: "🍽 Food" },
    { id: "nightlife", label: "🎵 Nightlife" },
    { id: "outdoors", label: "🌿 Outdoors" },
    { id: "culture", label: "🎨 Culture" },
    { id: "sports", label: "⚽ Sports" },
  ];

  const chips = ["Vienna", "Lisbon", "Tokyo", "Barcelona", "Berlin", "Seoul", "NYC", "Lagos"];

  const doSearch = async (city, cat) => {
    const q = getSearchQuery(cat, city);
    const key = `${city}-${cat}`;
    if (lastSearch.current === key) return;
    lastSearch.current = key;
    setLoading(true); setError(null); setResults([]); setHasSearched(true); setCurrentCity(city);
    try {
      const places = await searchPlaces(q);
      if (!places.length) setError("No results found. Try a different city.");
      else setResults(places);
    } catch (e) { setError(e.message || "Something went wrong."); }
    finally { setLoading(false); }
  };

  React.useEffect(() => {
    if (initialCity) doSearch(initialCity, "all");
  }, []);

  const handleSearch = () => { if (query.trim()) doSearch(query.trim(), activeCategory); };
  const handleChip = (city) => { setQuery(city); lastSearch.current = ""; setTimeout(() => doSearch(city, activeCategory), 50); };
  const handleCategory = (cat) => { setActiveCategory(cat); lastSearch.current = ""; if (hasSearched && currentCity) setTimeout(() => doSearch(currentCity, cat), 50); };

  return (
    <div style={{ paddingBottom: 90 }}>
      <div style={{ padding: "24px 20px 0" }}>
        <h2 style={{ fontSize: 22, fontFamily: fd, fontWeight: 400, color: C.text, marginBottom: 20 }}>Explore</h2>
        <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
          <div style={{ flex: 1, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: "12px 14px", display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ color: C.muted }}>🔍</span>
            <input value={query} onChange={e => { setQuery(e.target.value); lastSearch.current = ""; }}
              onKeyDown={e => e.key === "Enter" && handleSearch()}
              placeholder="Search any city..."
              style={{ background: "none", border: "none", outline: "none", fontSize: 15, color: C.text, flex: 1, fontFamily: fb }} />
            {query && <button onClick={() => { setQuery(""); setResults([]); setHasSearched(false); setError(null); lastSearch.current = ""; }} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer", fontSize: 18, padding: 0 }}>×</button>}
          </div>
          <button onClick={handleSearch} disabled={loading || !query.trim()}
            style={{ background: query.trim() && !loading ? C.accent : C.faint, border: "none", borderRadius: 12, padding: "0 18px", cursor: query.trim() && !loading ? "pointer" : "default", fontSize: 14, fontWeight: 500, color: query.trim() && !loading ? "#000" : C.muted, transition: "all 0.15s", minWidth: 56 }}>
            {loading ? "···" : "Go"}
          </button>
        </div>
        <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 8 }}>
          {chips.map(c => (
            <button key={c} onClick={() => handleChip(c)}
              style={{ background: currentCity === c ? C.accent + "22" : C.faint, border: `1px solid ${currentCity === c ? C.accent + "44" : C.border}`, borderRadius: 20, padding: "5px 13px", fontSize: 12, color: currentCity === c ? C.accent : C.muted, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>
              {c}
            </button>
          ))}
        </div>
        <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4, marginTop: 10 }}>
          {categories.map(cat => (
            <button key={cat.id} onClick={() => handleCategory(cat.id)}
              style={{ background: activeCategory === cat.id ? C.accent : C.surface, border: `1px solid ${activeCategory === cat.id ? C.accent : C.border}`, borderRadius: 20, padding: "6px 14px", fontSize: 12, color: activeCategory === cat.id ? "#000" : C.muted, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0, transition: "all 0.15s" }}>
              {cat.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{ padding: "16px 20px 0" }}>
        {loading && <Spinner label="Finding places..." />}
        {!loading && error && <div style={{ background: "#1a0d0d", border: "1px solid #3a1a1a", borderRadius: 14, padding: "16px" }}><p style={{ color: "#e07b7b", fontSize: 13 }}>{error}</p></div>}
        {!loading && !error && results.length > 0 && (
          <div style={{ animation: "fadeUp 0.4s ease" }}>
            <p style={{ fontSize: 12, color: C.muted, marginBottom: 14 }}>{results.length} places in {currentCity} · matched to your profile</p>
            {results.map((place, i) => {
              const cats = (place.categories || []).map(c => c.name).join(" · ") || "Venue";
              const loc = [place.location?.locality, place.location?.country].filter(Boolean).join(", ");
              const score = matchScore(place);
              const people = getPeopleForPlace(place);
              return (
                <div key={place.fsq_id || i} onClick={() => onSelectPlace(place, currentCity)}
                  style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: "16px", cursor: "pointer", marginBottom: 10, animation: `fadeUp 0.35s ease ${i * 0.05}s both` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                    <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                      <span style={{ fontSize: 24, flexShrink: 0 }}>{emojiFor(place.categories)}</span>
                      <div>
                        <p style={{ fontSize: 15, fontFamily: fd, color: C.text, marginBottom: 2 }}>{place.name}</p>
                        <p style={{ fontSize: 11, color: C.muted }}>{cats}</p>
                      </div>
                    </div>
                    <MatchBadge score={score} />
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 12, color: C.muted }}>📍 {loc || "—"}</span>
                    <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                      {place.rating && <span style={{ fontSize: 12, color: C.green }}>★ {place.rating.toFixed(1)}</span>}
                      <div style={{ display: "flex" }}>
                        {people.slice(0, 3).map((p, idx) => (
                          <div key={idx} style={{ width: 20, height: 20, borderRadius: "50%", background: connected[p.initials] ? C.accent + "33" : C.faint, border: `1px solid ${connected[p.initials] ? C.accent : C.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 8, color: C.muted, marginLeft: idx > 0 ? -6 : 0 }}>
                            {p.initials[0]}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
        {!loading && !hasSearched && (
          <div style={{ textAlign: "center", padding: "52px 20px" }}>
            <div style={{ fontSize: 36, marginBottom: 14, opacity: 0.3 }}>✦</div>
            <p style={{ fontFamily: fd, fontSize: 20, color: C.text, marginBottom: 8 }}>Where are you headed?</p>
            <p style={{ fontSize: 13, color: C.muted, lineHeight: 1.6 }}>Search any city — real venues, honest AI reviews, and people who share your taste.</p>
          </div>
        )}
      </div>
    </div>
  );
}

function SavedScreen({ saved, onSelectPlace }) {
  if (!saved.length) return (
    <div style={{ padding: "24px 20px", paddingBottom: 90 }}>
      <h2 style={{ fontSize: 22, fontFamily: fd, fontWeight: 400, color: C.text, marginBottom: 20 }}>Saved</h2>
      <div style={{ textAlign: "center", padding: "52px 20px" }}>
        <div style={{ fontSize: 36, marginBottom: 14, opacity: 0.3 }}>♡</div>
        <p style={{ fontFamily: fd, fontSize: 18, color: C.text, marginBottom: 8 }}>Nothing saved yet</p>
        <p style={{ fontSize: 13, color: C.muted, lineHeight: 1.6 }}>Tap the heart on any place to save it here.</p>
      </div>
    </div>
  );
  return (
    <div style={{ padding: "24px 20px", paddingBottom: 90 }}>
      <h2 style={{ fontSize: 22, fontFamily: fd, fontWeight: 400, color: C.text, marginBottom: 20 }}>Saved</h2>
      {saved.map((place, i) => (
        <div key={i} onClick={() => onSelectPlace(place, "")}
          style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: "16px", cursor: "pointer", marginBottom: 10 }}>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <span style={{ fontSize: 24 }}>{emojiFor(place.categories)}</span>
            <div>
              <p style={{ fontSize: 15, fontFamily: fd, color: C.text, marginBottom: 2 }}>{place.name}</p>
              <p style={{ fontSize: 11, color: C.muted }}>{[place.location?.locality, place.location?.country].filter(Boolean).join(", ")}</p>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function ProfileScreen({ connected, saved }) {
  const connectedCount = Object.values(connected).filter(Boolean).length;
  const connectedPeople = PEOPLE_POOL.filter(p => connected[p.initials]);
  return (
    <div style={{ padding: "24px 20px", paddingBottom: 90 }}>
      <h2 style={{ fontSize: 22, fontFamily: fd, fontWeight: 400, color: C.text, marginBottom: 24 }}>Profile</h2>
      <div style={{ background: "linear-gradient(135deg,#141408,#0d0d0a)", border: `1px solid ${C.accent}22`, borderRadius: 18, padding: "24px", marginBottom: 20, textAlign: "center" }}>
        <div style={{ width: 64, height: 64, borderRadius: "50%", background: C.accent + "22", border: `1px solid ${C.accent}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, fontWeight: 500, color: C.accent, margin: "0 auto 14px" }}>PE</div>
        <h3 style={{ fontSize: 22, fontFamily: fd, fontWeight: 400, color: C.text, marginBottom: 4 }}>{USER.name}</h3>
        <p style={{ fontSize: 13, color: C.muted, marginBottom: 10 }}>📍 {USER.homeCity}</p>
        <div style={{ display: "inline-block", background: C.accent + "22", border: `1px solid ${C.accent}44`, borderRadius: 20, padding: "5px 14px", fontSize: 12, color: C.accent }}>{USER.persona}</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 20 }}>
        {[{ label: "Places saved", val: saved.length }, { label: "Connections", val: connectedCount }, { label: "Cities", val: 1 }].map(s => (
          <div key={s.label} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px 10px", textAlign: "center" }}>
            <p style={{ fontSize: 22, fontFamily: fd, color: C.text, marginBottom: 4 }}>{s.val}</p>
            <p style={{ fontSize: 10, color: C.muted, lineHeight: 1.3 }}>{s.label}</p>
          </div>
        ))}
      </div>
      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "18px", marginBottom: 16 }}>
        <p style={{ fontSize: 12, color: C.muted, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 14 }}>Taste Profile</p>
        <p style={{ fontSize: 12, color: C.muted, marginBottom: 8 }}>Food</p>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
          {USER.foodProfile.map(f => <span key={f} style={{ fontSize: 12, color: C.muted, background: C.faint, border: `1px solid ${C.border}`, borderRadius: 6, padding: "3px 9px" }}>{f}</span>)}
        </div>
        <p style={{ fontSize: 12, color: C.muted, marginBottom: 8 }}>Activities</p>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {USER.activities.map(a => <span key={a} style={{ fontSize: 12, color: C.muted, background: C.faint, border: `1px solid ${C.border}`, borderRadius: 6, padding: "3px 9px" }}>{a}</span>)}
        </div>
      </div>
      {connectedPeople.length > 0 && (
        <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "18px" }}>
          <p style={{ fontSize: 12, color: C.muted, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 14 }}>Your Connections</p>
          {connectedPeople.map((p, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: i < connectedPeople.length - 1 ? 12 : 0 }}>
              <div style={{ width: 36, height: 36, borderRadius: "50%", background: C.accent + "22", border: `1px solid ${C.accent}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, color: C.accent, flexShrink: 0 }}>{p.initials}</div>
              <div>
                <p style={{ fontSize: 13, color: C.text, marginBottom: 1 }}>{p.name}</p>
                <p style={{ fontSize: 11, color: C.muted }}>📍 {p.city}</p>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function DetailScreen({ place, city, onBack, connected, onConnect, onSave, saved }) {
  const [aiReview, setAiReview] = React.useState("");
  const [aiLoading, setAiLoading] = React.useState(true);
  const [detailTab, setDetailTab] = React.useState("review");
  const peoplForPlace = getPeopleForPlace(place);
  const activities = getActivitiesForCity(city || place.location?.locality || "Vienna");
  const isSaved = saved.some(s => s.fsq_id === place.fsq_id);
  const connectedCount = Object.values(connected).filter(Boolean).length;

  React.useEffect(() => {
    synthesiseReview(place, USER)
      .then(r => setAiReview(r))
      .catch(() => setAiReview("AI review unavailable.\n✓ Tip: Check recent Google Maps reviews for the latest info."))
      .finally(() => setAiLoading(false));
  }, [place.fsq_id]);

  const tipLine = aiReview.split("\n").find(l => l.startsWith("✓"));
  const reviewBody = aiReview.split("\n").filter(l => !l.startsWith("✓")).join(" ").trim();

  return (
    <div style={{ paddingBottom: 90, animation: "fadeUp 0.3s ease" }}>
      <div style={{ padding: "20px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <button onClick={onBack} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 14px", cursor: "pointer", fontSize: 13, color: C.muted }}>← Back</button>
          <button onClick={() => onSave(place)} style={{ background: isSaved ? C.pink + "22" : "none", border: `1px solid ${isSaved ? C.pink : C.border}`, borderRadius: 8, padding: "8px 16px", cursor: "pointer", fontSize: 18, color: isSaved ? C.pink : C.muted, transition: "all 0.2s" }}>
            {isSaved ? "♥" : "♡"}
          </button>
        </div>
        <span style={{ fontSize: 40 }}>{emojiFor(place.categories)}</span>
        <h1 style={{ fontSize: 24, fontFamily: fd, fontWeight: 400, color: C.text, margin: "10px 0 4px" }}>{place.name}</h1>
        <p style={{ fontSize: 13, color: C.muted, marginBottom: 4 }}>{(place.categories || []).map(c => c.name).join(" · ")}</p>
        <p style={{ fontSize: 12, color: C.muted, marginBottom: 20 }}>📍 {[place.location?.locality, place.location?.country].filter(Boolean).join(", ")}</p>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 20 }}>
          {[
            { label: "Rating", val: place.rating ? `${place.rating}/5` : "—", color: C.text },
            { label: "Reviews", val: place.stats?.total_ratings ? place.stats.total_ratings.toLocaleString() : "—", color: C.text },
            { label: "Match", val: `${matchScore(place)}%`, color: C.accent },
          ].map(stat => (
            <div key={stat.label} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "13px 10px", textAlign: "center" }}>
              <p style={{ fontSize: 16, fontFamily: fd, color: stat.color, marginBottom: 4 }}>{stat.val}</p>
              <p style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: "0.08em" }}>{stat.label}</p>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", borderBottom: `1px solid ${C.border}`, marginBottom: 20 }}>
          {["review", "people", "doing"].map(t => (
            <button key={t} onClick={() => setDetailTab(t)} style={{ background: "none", border: "none", borderBottom: detailTab === t ? `2px solid ${C.accent}` : "2px solid transparent", padding: "10px 16px", cursor: "pointer", fontSize: 13, color: detailTab === t ? C.accent : C.muted, textTransform: "capitalize", letterSpacing: "0.05em", transition: "all 0.15s" }}>
              {t === "doing" ? "Others doing" : t}
            </button>
          ))}
        </div>
        {detailTab === "review" && (
          <div style={{ background: "linear-gradient(135deg,#141408,#101008)", border: `1px solid ${C.accent}22`, borderRadius: 16, padding: "18px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
              <span>✦</span>
              <span style={{ fontSize: 11, color: C.accent, letterSpacing: "0.12em", textTransform: "uppercase" }}>Honest Review · AI Synthesis</span>
            </div>
            {aiLoading
              ? <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ width: 16, height: 16, border: `2px solid ${C.faint}`, borderTop: `2px solid ${C.accent}`, borderRadius: "50%", animation: "spin 0.8s linear infinite", flexShrink: 0 }} />
                  <p style={{ fontSize: 13, color: C.muted }}>Synthesising for your taste profile...</p>
                </div>
              : <>
                  <p style={{ fontSize: 14, color: C.text, lineHeight: 1.75, marginBottom: tipLine ? 14 : 0 }}>{reviewBody}</p>
                  {tipLine && <div style={{ background: "#0d1a0d", border: "1px solid #1a3a1a", borderRadius: 8, padding: "10px 14px" }}>
                    <p style={{ fontSize: 13, color: C.green }}>{tipLine}</p>
                  </div>}
                </>
            }
          </div>
        )}
        {detailTab === "people" && (
          <div>
            <p style={{ fontSize: 13, color: C.muted, marginBottom: 16, lineHeight: 1.6 }}>Travellers who share your taste profile and visited this place.</p>
            {peoplForPlace.map((person, i) => <PersonCard key={i} person={person} connected={!!connected[person.initials]} onConnect={onConnect} />)}
            {connectedCount > 0 && (
              <div style={{ marginTop: 8, background: C.pink + "15", border: `1px solid ${C.pink}33`, borderRadius: 12, padding: "12px 16px" }}>
                <p style={{ fontSize: 13, color: C.pink }}>✓ {connectedCount} connection{connectedCount > 1 ? "s" : ""} made — they'll be notified when you're in their city.</p>
              </div>
            )}
          </div>
        )}
        {detailTab === "doing" && (
          <div>
            <p style={{ fontSize: 13, color: C.muted, marginBottom: 16, lineHeight: 1.6 }}>People with your taste profile are also doing these in {city || "this city"}.</p>
            {activities.map((a, i) => (
              <div key={i} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "14px 16px", display: "flex", alignItems: "center", gap: 14, marginBottom: 10 }}>
                <span style={{ fontSize: 28, flexShrink: 0 }}>{a.type}</span>
                <div style={{ flex: 1 }}>
                  <p style={{ fontSize: 14, fontFamily: fd, color: C.text, marginBottom: 4 }}>{a.label}</p>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <MatchBadge score={a.match} />
                    <span style={{ fontSize: 11, color: C.muted }}>{a.people} people going</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [appScreen, setAppScreen] = React.useState("setup");
  const [navTab, setNavTab] = React.useState("discover");
  const [selectedPlace, setSelectedPlace] = React.useState(null);
  const [selectedCity, setSelectedCity] = React.useState("");
  const [prevTab, setPrevTab] = React.useState("discover");
  const [connected, setConnected] = React.useState({});
  const [saved, setSaved] = React.useState([]);
  const [searchInitialCity, setSearchInitialCity] = React.useState("");
  const activities = getActivitiesForCity(selectedCity || "Vienna");

  const handleConnect = (initials) => setConnected(p => ({ ...p, [initials]: !p[initials] }));
  const handleSave = (place) => setSaved(prev => prev.some(s => s.fsq_id === place.fsq_id) ? prev.filter(s => s.fsq_id !== place.fsq_id) : [...prev, place]);

  const handleSelectPlace = (place, city) => {
    setSelectedPlace(place); setSelectedCity(city);
    setPrevTab(navTab); setAppScreen("detail");
  };

  const handleNav = (tab, city) => {
    if (city) { setSearchInitialCity(city); setNavTab("search"); }
    else { setNavTab(tab); setSearchInitialCity(""); }
    setAppScreen("main");
  };

  if (appScreen === "setup") return (
    <div style={{ maxWidth: 430, margin: "0 auto", padding: "32px 24px", animation: "fadeUp 0.5s ease" }}>
      <div style={{ fontSize: 38, marginBottom: 20 }}>✦</div>
      <h2 style={{ fontFamily: fd, fontWeight: 400, fontSize: 28, color: C.text, marginBottom: 10 }}>Honest Review</h2>
      <p style={{ color: C.muted, fontSize: 14, lineHeight: 1.7, marginBottom: 32 }}>Real venue data · AI reviews · Connect with people who share your taste.</p>
      {[
        { icon: "📍", title: "Google Places", sub: "Live venue data across every city", badge: "LIVE" },
        { icon: "✦", title: "Claude AI synthesis", sub: "Personalised honest review per venue", badge: "AI" },
        { icon: "🌍", title: "Social matching", sub: "Connect with travellers like you", badge: "NEW" },
      ].map(item => (
        <div key={item.title} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "14px 16px", display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
          <span style={{ fontSize: 20 }}>{item.icon}</span>
          <div style={{ flex: 1 }}>
            <p style={{ fontSize: 14, color: C.text, marginBottom: 2 }}>{item.title}</p>
            <p style={{ fontSize: 11, color: C.muted }}>{item.sub}</p>
          </div>
          <span style={{ fontSize: 10, color: C.accent, background: C.accent + "15", border: `1px solid ${C.accent}33`, borderRadius: 6, padding: "3px 8px", letterSpacing: "0.08em" }}>{item.badge}</span>
        </div>
      ))}
      <button onClick={() => setAppScreen("main")} style={{ width: "100%", background: C.accent, border: "none", borderRadius: 12, padding: "15px", fontSize: 14, fontWeight: 500, cursor: "pointer", marginTop: 20 }}>
        Start exploring →
      </button>
    </div>
  );

  if (appScreen === "detail" && selectedPlace) return (
    <div style={{ maxWidth: 430, margin: "0 auto", background: C.bg, minHeight: "100vh" }}>
      <DetailScreen place={selectedPlace} city={selectedCity} onBack={() => { setAppScreen("main"); setNavTab(prevTab); }} connected={connected} onConnect={handleConnect} onSave={handleSave} saved={saved} />
      <BottomNav active={prevTab} onNav={handleNav} />
    </div>
  );

  return (
    <div style={{ maxWidth: 430, margin: "0 auto", background: C.bg, minHeight: "100vh" }}>
      {navTab === "discover" && <DiscoverScreen onSelectPlace={handleSelectPlace} onNav={handleNav} connected={connected} currentCity={selectedCity} activities={activities} />}
      {navTab === "search" && <SearchScreen key={searchInitialCity} onSelectPlace={handleSelectPlace} connected={connected} initialCity={searchInitialCity} />}
      {navTab === "saved" && <SavedScreen saved={saved} onSelectPlace={handleSelectPlace} />}
      {navTab === "profile" && <ProfileScreen connected={connected} saved={saved} />}
      <BottomNav active={navTab} onNav={handleNav} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
